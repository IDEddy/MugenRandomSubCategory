        <button id="randomizeButton" class="w-full py-4 text-lg font-bold bg-[#64ffda] text-[#0d1117] rounded-lg glow-button focus:outline-none focus:ring-4 focus:ring-[#64ffda] focus:ring-opacity-50">

        </div>

            return text
                .toLowerCase()
                .replace(/[\uD800-\uDBFF\uDC00-\uDFFF\u2600-\u27BF\uE000-\uF8FF]/g, '') // Remove emojis
                .trim()
                .replace(/\s+/g, '-') // Replace spaces with hyphens
                .replace(/[\/,\.]/g, '') // Remove slashes, commas, and dots
                .replace(/[^\w\-]+/g, '') // Remove all non-word chars except hyphens
                .replace(/\-\-+/g, '-') // Replace multiple hyphens with single hyphen
                .replace(/^-+/, '') // Trim hyphens from start
                .replace(/-+$/, ''); // Trim hyphens from end
        }

        for (const mainCat in mugenCategories) {
            mugenCategories[mainCat].forEach(subCat => {
                allSubCategories.push({
                    main: mainCat,
                    sub: subCat.name,
                    id: subCat.id // Include the ID
                });
            });
        }

        const resultArea = document.getElementById('resultArea');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const mainCategoryDisplay = document.getElementById('mainCategoryDisplay');
        const subCategoryDisplay = document.getElementById('subCategoryDisplay');
        const searchLink = document.getElementById('searchLink');
        const randomizeButton = document.getElementById('randomizeButton');

        function selectRandomSubCategory() {
            // Show loading, hide result
            resultArea.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            randomizeButton.disabled = true;

            // Simulate a short delay for dramatic effect (optional)
            setTimeout(() => {
                // 1. Pick a random index
                const randomIndex = Math.floor(Math.random() * allSubCategories.length); 
                const selection = allSubCategories[randomIndex];

                let url;
                const baseUrl = "https://mugenarchive.com/forums/downloads.php";

                // Ensure non-alphanumeric characters (like emojis) are removed for slug creation
                const cleanSubName = selection.sub.replace(/[\uD800-\uDBFF\uDC00-\uDFFF\u2600-\u27BF\uE000-\uF8FF]/g, '').trim(); 

                // Since all IDs are now non-zero, we always use the direct category link.
                const slug = createSlug(cleanSubName);
                url = `${baseUrl}?do=cat&id=${selection.id}-${slug}`;
                searchLink.textContent = "Go to Category Page Directly";
                searchLink.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                searchLink.classList.add('bg-green-600', 'hover:bg-green-700');
                
                // 4. Update the display
                mainCategoryDisplay.textContent = selection.main;
                subCategoryDisplay.textContent = selection.sub;
                searchLink.href = url;

                // 5. Hide loading, show result
                loadingIndicator.classList.add('hidden');
                resultArea.classList.remove('hidden');
                randomizeButton.disabled = false;
            }, 800); // 800ms delay
        }

        randomizeButton.addEventListener('click', selectRandomSubCategory);
