    <style>
        /* Custom font for a clean, modern look */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117; /* Dark background */
        }
        /* Custom glow styles for buttons */
        .glow-button-green {
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.5); /* Soft cyan glow */
        }
        .glow-button-green:hover {
            box-shadow: 0 0 25px rgba(100, 255, 218, 0.8), 0 0 5px rgba(100, 255, 218, 0.5);
            transform: translateY(-2px);
        }
        .glow-button-blue {
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); /* Soft blue glow */
        }

            box-shadow: 0 0 25px rgba(59, 130, 246, 0.8), 0 0 5px rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }
        .result-card {
            background-color: #161b22; /* Slightly lighter dark card background */
            transition: transform 0.3s ease;
        }
        /* Specific styling for the choice buttons/links */
        .choice-link {
            transition: background-color 0.2s, transform 0.1s, border-color 0.2s;
            text-align: left;
            padding: 1rem;
            border-radius: 0.5rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #21262d; /* Default background */
            border: 1px solid #444c56; /* Default border color */
            text-decoration: none; /* No underline */
            color: #e5e7eb; /* Gray-200 */
            cursor: pointer;
        }
        .choice-link:hover {
            background-color: #2c3541; /* Slightly lighter hover */
            transform: translateY(-1px);
            border-color: #64ffda;
            box-shadow: 0 0 10px rgba(100, 255, 218, 0.2);

                    M.U.G.E.N 8-Choice Randomizer
                </h2>
                <p class="text-center text-gray-400 mb-6 text-sm">

                </p>

                <button id="randomizeButton" class="w-full py-4 text-lg font-bold bg-[#64ffda] text-[#0d1117] rounded-lg glow-button-green focus:outline-none focus:ring-4 focus:ring-[#64ffda] focus:ring-opacity-50 mb-6">
                    Generate 8 New Choices
                </button>

                <!-- 8 Choices Display Grid -->

                </div>
            </div>
            
            <!-- Panel 2: Range Number Generator -->

                    Range Number Generator
                </h2>
                <p class="text-center text-gray-400 mb-6 text-sm">

                </p>

                <!-- Inputs -->
                <div class="flex space-x-4 mb-6">
                    <input type="number" id="minInput" placeholder="Min (e.g., 1)" class="w-1/2 p-3 rounded-lg bg-[#0d1117] text-white border border-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" value="1">
                    <input type="number" id="maxInput" placeholder="Max (e.g., 100)" class="w-1/2 p-3 rounded-lg bg-[#0d1117] text-white border border-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500" value="100">
                </div>

                <button id="generateNumberButton" class="w-full py-4 text-lg font-bold bg-blue-600 text-white rounded-lg glow-button-blue focus:outline-none focus:ring-4 focus:ring-blue-600 focus:ring-opacity-50 hover:bg-blue-700">
                    Generate Random Number
                </button>

                        <p class="text-sm text-gray-400 mb-2 uppercase">Your Random Number</p>
                        <h3 id="generatedNumberDisplay" class="text-4xl font-extrabold text-blue-500"></h3>
                        <p id="numberRangeDisplay" class="text-sm text-gray-400 mt-2"></p>
                    </div>
                </div>
            </div>

        </div> <!-- End of Grid -->
        
    </div>

            return text

                .replace(/[\uD800-\uDBFF\uDC00-\uDFFF\u2600-\u27BF\uE000-\uF8FF]/g, '') // Remove emojis
                .trim()
                .replace(/\s+/g, '-') // Replace spaces with hyphens
                .replace(/[\/,\.]/g, '') // Remove slashes, commas, and dots
                .replace(/[^\w\-]+/g, '') // Remove all non-word chars except hyphens
                .replace(/\-\-+/g, '-') // Replace multiple hyphens with single hyphen

                { name: "Pocket edits", id: 316 }, { name: "Kung Fu Man edits", id: 301 }, { name: "Smash Mod ??", id: 538 }, { name: "Null edits ??", id: 536 }, 
                { name: "The Blender ??", id: 564 }, { name: "18+ edits", id: 324 }

        // Flatten the data into a single array of objects for easy randomization
        let allSubCategories = [];
        for (const mainCat in mugenCategories) {
            mugenCategories[mainCat].forEach(subCat => {
                allSubCategories.push({
                    main: mainCat,
                    sub: subCat.name,
                    id: subCat.id // Include the ID
                });
            });
        }

        // --- MUGEN RANDOMIZER LOGIC ---

        const NUM_CHOICES = 8;
        const mugenLoadingIndicator = document.getElementById('loadingIndicator');
        const mugenRandomizeButton = document.getElementById('randomizeButton');
        const choiceContainer = document.getElementById('choiceButtonsContainer');

        let currentChoices = []; // Store the 8 unique choices

        // Function to create a button element (now an <a> tag)
        function createChoiceButton(index, choice) {
            // Construct the URL immediately
            const baseUrl = "https://mugenarchive.com/forums/downloads.php";
            const cleanSubName = choice.sub.replace(/[\uD800-\uDBFF\uDC00-\uDFFF\u2600-\u27BF\uE000-\uF8FF]/g, '').trim(); 
            const slug = createSlug(cleanSubName);
            const url = `${baseUrl}?do=cat&id=${choice.id}-${slug}`;

            // Create an anchor tag instead of a button
            const link = document.createElement('a');
            link.className = 'choice-link';
            link.href = url;
            link.target = "_blank"; // Open in new tab
            
            link.innerHTML = `
                <span class="text-sm text-[#64ffda] font-bold mr-2">${index + 1}.</span>
                <span class="flex-grow text-center text-sm sm:text-base">${choice.sub}</span>
                <span class="text-xs text-gray-500 ml-2">(${choice.main})</span>
            `;
            
            return link;
        }

        // Function to generate the 8 new choices
        function generateNewChoices() {
            // Reset UI
            choiceContainer.innerHTML = '';
            mugenRandomizeButton.disabled = true;
            mugenLoadingIndicator.classList.remove('hidden');

            currentChoices = [];
            const tempArray = [...allSubCategories]; // Copy the array to pick from

            // Ensure we don't try to pick more choices than available categories
            const limit = Math.min(NUM_CHOICES, allSubCategories.length);

            // Logic to select 8 unique random choices
            for (let i = 0; i < limit; i++) {
                if (tempArray.length === 0) break; 
                
                const randomIndex = Math.floor(Math.random() * tempArray.length);
                const choice = tempArray.splice(randomIndex, 1)[0]; // Pick and remove
                currentChoices.push(choice);
            }

            // Simulate delay then display results
            setTimeout(() => {
                currentChoices.forEach((choice, index) => {
                    choiceContainer.appendChild(createChoiceButton(index, choice));
                });

                mugenLoadingIndicator.classList.add('hidden');
                mugenRandomizeButton.disabled = false;
            }, 100); // 800ms delay
        }
        
        // Attach event listener to the main generator button
        mugenRandomizeButton.addEventListener('click', generateNewChoices);
        
        // Initialize the page by running the generator once
        generateNewChoices();


        // --- NUMBER GENERATOR LOGIC ---

        const minInput = document.getElementById('minInput');
        const maxInput = document.getElementById('maxInput');
        const generateNumberButton = document.getElementById('generateNumberButton');
        const numberResultArea = document.getElementById('numberResultArea');
        const generatedNumberDisplay = document.getElementById('generatedNumberDisplay');
        const numberRangeDisplay = document.getElementById('numberRangeDisplay');

        function generateRandomNumber() {
            numberResultArea.classList.add('hidden');

            const min = parseInt(minInput.value, 10);
            const max = parseInt(maxInput.value, 10);

            // Validation (using custom message box logic instead of alert)
            if (minInput.value === "" || maxInput.value === "" || isNaN(min) || isNaN(max) || min > max) {
                
                let message = "Please enter valid integers.";
                if (minInput.value === "" || maxInput.value === "") {
                    message = "Please fill in both Min and Max fields.";
                } else if (min > max) {
                    message = "Min value must be less than or equal to Max value.";
                }

                generatedNumberDisplay.textContent = "Error";
                numberRangeDisplay.textContent = message;
                generatedNumberDisplay.classList.remove('text-blue-500');
                generatedNumberDisplay.classList.add('text-red-500');
                numberResultArea.classList.remove('hidden');
                return;
            }

            // Restore success styling
            generatedNumberDisplay.classList.remove('text-red-500');
            generatedNumberDisplay.classList.add('text-blue-500');
            generateNumberButton.disabled = true;

            setTimeout(() => {
                // Calculation: Math.floor(Math.random() * (max - min + 1)) + min
                const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;

                generatedNumberDisplay.textContent = randomNumber;
                numberRangeDisplay.textContent = `(Range: ${min} to ${max})`;
                
                numberResultArea.classList.remove('hidden');
                generateNumberButton.disabled = false;
            }, 500); 
        }

        generateNumberButton.addEventListener('click', generateRandomNumber);
