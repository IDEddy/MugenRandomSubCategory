        const weightedPool = [];
        Object.keys(mugenCategories).forEach(cat => {
            mugenCategories[cat].forEach(sub => {
                const flash = sub.flash || 5;
                for (let i = 0; i < flash; i++) {
                    weightedPool.push({ ...sub, main: cat, flash });
                }
            });
        });

        function createUrl(item) {
            const slug = item.name.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '');
            return `https://mugenarchive.com/forums/downloads.php?do=cat&id=${item.id}-${slug}`;
        }

        function getStyles(f) {
            if (f >= 9) return { border: 'glow-gold', text: 'text-yellow-400', label: 'ULTRA' };
            if (f >= 7) return { border: 'glow-purple', text: 'text-purple-400', label: 'HIGH' };
            return { border: 'border-gray-600', text: 'text-blue-400', label: 'MID' };
        }

        function generate() {
            const choiceContainer = document.getElementById('choiceButtonsContainer');
            const rankingContainer = document.getElementById('rankingContainer');
            choiceContainer.innerHTML = ''; rankingContainer.innerHTML = '';
            
            let picks = []; let seen = new Set();
            while (picks.length < 8) {
                const p = weightedPool[Math.floor(Math.random() * weightedPool.length)];
                if (!seen.has(p.name)) { picks.push(p); seen.add(p.name); }
            }

            picks.forEach((p, i) => {
                const s = getStyles(p.flash);
                const a = document.createElement('a');
                a.className = `choice-link p-3 rounded ${s.border}`;
                a.href = createUrl(p); a.target = "_blank";
                a.innerHTML = `<span class="text-xs font-black ${s.text}">${i+1}</span><span class="text-[9px] sm:text-[10px] font-bold text-center flex-grow uppercase leading-tight px-1">${p.name}</span>`;
                choiceContainer.appendChild(a);
            });

            [...picks].sort((a,b) => b.flash - a.flash).forEach(p => {
                const s = getStyles(p.flash);
                const a = document.createElement('a');
                a.className = `rank-link bg-[#161b22] p-3 rounded border ${s.border} flex justify-between items-center text-xs`;
                a.href = createUrl(p); a.target = "_blank";
                a.innerHTML = `<div><span class="block text-[10px] font-black ${s.text}">${s.label}</span><span class="uppercase">${p.name}</span></div><span class="text-gray-500">${p.flash}/10</span>`;
                rankingContainer.appendChild(a);
            });
        }

        document.getElementById('randomizeButton').addEventListener('click', generate);

            const min = parseInt(document.getElementById('minInput').value) || 1;
            const max = parseInt(document.getElementById('maxInput').value) || 100;
            if (min <= max) {
                document.getElementById('numDisplay').textContent = Math.floor(Math.random() * (max - min + 1)) + min;
                document.getElementById('numResult').classList.remove('hidden');
            }
        });
        generate();
